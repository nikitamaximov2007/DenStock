{% extends "base.html" %}
{% block title %}{{ title }} · DenStock{% endblock %}
{% block content %}
  <h1 class="page-title">{{ title }}</h1>
  <p>
    <a href="{% url 'batch_detail' batch.pk %}">← К партии {{ batch.number }}</a>
  </p>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn--primary">Сохранить</button>
  </form>
{% endblock %}
