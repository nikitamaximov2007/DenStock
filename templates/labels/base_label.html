{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Этикетки — DenStock{% endblock %}</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; background: #fff; color: #000;
             font-family: "DejaVu Sans", Arial, sans-serif; }
      .labels-toolbar { padding: 10px 14px; }
      .labels-toolbar button { font-size: 14px; padding: 6px 14px; cursor: pointer; }
      .labels-toolbar a { margin-left: 12px; font-size: 13px; }
      .sheet { display: flex; flex-wrap: wrap; gap: 4mm; padding: 8mm; }
      .label { box-sizing: border-box; width: 58mm; height: 40mm;
               border: 1px solid #bbb; padding: 2mm 3mm;
               display: flex; flex-direction: column; overflow: hidden; }
      .label__barcode { text-align: center; line-height: 0; }
      .label__barcode svg { max-width: 100%; height: auto; }
      .label__code { text-align: center; font-weight: 700; font-size: 11pt;
                     font-family: "DejaVu Sans Mono", monospace; letter-spacing: .5px;
                     margin: 1mm 0; word-break: break-all; }
      .label__title { font-size: 10pt; font-weight: 700; }
      .label__rows { font-size: 8pt; line-height: 1.3; margin-top: .5mm; }
      .label__rows div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .labels-empty { padding: 8mm; color: #555; }
      @media print {
        .labels-toolbar { display: none; }
        .sheet { padding: 0; gap: 0; }
        .label { border: none; page-break-inside: avoid; }
        @page { size: 58mm 40mm; margin: 0; }
      }
    </style>
  </head>
  <body>
    <div class="labels-toolbar">
      <button type="button" onclick="window.print()">Печать</button>
      <a href="javascript:history.back()">← Назад</a>
    </div>
    <div class="sheet">
      {% block labels %}{% endblock %}
    </div>
  </body>
</html>
