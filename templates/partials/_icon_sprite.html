{% comment %}
  Спрайт иконок навигации (один раз в base.html). Каждый пункт меню ссылается на
  символ через <use href="#i-<icon>">. Обводка/заливка задаются CSS (.icon), поэтому
  символы содержат только геометрию. Простые line-иконки, без декора.
{% endcomment %}
<svg class="icon-sprite"
     width="0"
     height="0"
     aria-hidden="true"
     focusable="false"
     style="position:absolute;
            width:0;
            height:0;
            overflow:hidden">
